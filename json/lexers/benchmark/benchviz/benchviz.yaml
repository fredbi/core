# benchviz configuration — JSON lexers (default-lexer L + VL) vs easyjson jlexer
# and go-json-experiment json/v2 (jsontext).
#
# Renders a single horizontal bar chart of input tokenization throughput (MB/s)
# with the four tokenizers shown side by side for each corpus workload.
#
# Regenerate the chart:
#   benchviz -c benchviz.yaml -png -o throughput.png benchmark.txt
#
# Regenerate the data (median of 6 runs) — see README.md.
name: JSON lexers vs easyjson & json/v2
environment: ''

render:
  title: 'default-lexer (L + VL) vs easyjson & json/v2'
  theme: vintage
  chart: barchart
  legend: bottom
  scale: auto
  orientation: horizontal
  layout:
    horizontal: 1
  screenshot:
    width: 1280
    height: 580
    sleep: 2s

metrics:
  - id: MBytesPerS
    title: Throughput
    axis: 'MB/s'

functions:
  - id: lexers
    title: Lexers
    match: 'Lexers'

# one bar group per corpus workload (ordered best-to-worst L/jsontext ratio)
contexts:
  - id: update-center
    title: update-center
    match: 'update-center'
  - id: twitter
    title: twitter_status
    match: 'twitter_status'
  - id: gsoc
    title: gsoc-2018
    match: 'gsoc-2018'
  - id: random
    title: random
    match: 'random'
  - id: payload-large
    title: payload-large
    match: 'payload-large'
  - id: golang
    title: golang_source
    match: 'golang_source'
  - id: github
    title: github_events
    match: 'github_events'
  - id: canada
    title: canada_geometry
    match: 'canada_geometry'
  - id: citm
    title: citm_catalog
    match: 'citm_catalog'
  - id: marine_ik
    title: marine_ik
    match: 'marine_ik'
  - id: numbers
    title: numbers
    match: 'numbers'
  - id: instruments
    title: instruments
    match: 'instruments'
  - id: apache_builds
    title: apache_builds
    match: 'apache_builds'
  - id: mesh-pretty
    title: mesh.pretty
    match: 'mesh.pretty'
  - id: twitterescaped
    title: twitterescaped
    match: 'twitterescaped'
  - id: mesh
    title: mesh
    match: 'mesh'
    notmatch: 'pretty'

# one bar (series) per implementation, shown side by side
versions:
  - id: L
    title: L (semantic)
    match: 'L-semantic'
  - id: VL
    title: VL (verbatim)
    match: 'VL-verbatim'
  - id: easyjson
    title: easyjson
    match: 'easyjson'
  - id: jsontext
    title: json/v2 (jsontext)
    match: 'jsontext'

categories:
  - id: throughput
    title: '{metric} — JSON lexers vs easyjson & json/v2 (MB/s, higher is better)'
    includes:
      functions:
        - lexers
      versions:
        - L
        - VL
        - easyjson
        - jsontext
      contexts:
        - update-center
        - twitter
        - gsoc
        - random
        - payload-large
        - golang
        - github
        - canada
        - citm
        - marine_ik
        - numbers
        - instruments
        - apache_builds
        - mesh-pretty
        - twitterescaped
        - mesh
      metrics:
        - MBytesPerS
